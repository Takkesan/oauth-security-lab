version: '3.8'

services:
  # Keycloak: OAuth 2.0 / OpenID Connect サーバー
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-oauth-lab
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file  # Development mode - in-memory database
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
    command:
      - "start-dev"
      - "--import-realm"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realm-import:/opt/keycloak/data/import:ro
    networks:
      - oauth-lab

  # Firebase Local Emulator: Firestore データストア
  firebase-emulator:
    build:
      context: ../../
      dockerfile: docker/firebase/Dockerfile
    container_name: firebase-emulator-oauth-lab
    ports:
      - "4000:4000"    # Emulator Suite UI
      - "8082:8082"    # Cloud Firestore Emulator
    environment:
      CLOUD_FIRESTORE_EMULATOR_HOST: firebase-emulator:8082
      GCLOUD_PROJECT: oidc-testapp
    volumes:
      - firebase_data:/app/.data
    networks:
      - oauth-lab

volumes:
  keycloak_data:
    driver: local
  firebase_data:
    driver: local

networks:
  oauth-lab:
    driver: bridge
