services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak-oauth-lab
    command:
      - start-dev
      - --import-realm
    ports:
      - "18080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./realms:/opt/keycloak/data/import:Z